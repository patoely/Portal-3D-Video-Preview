<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <title>3D Portal Viewer – Pseudo HDRI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Importmap für Three.js -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.1/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.1/examples/jsm/"
        }
      }
    </script>

    <style>
      :root {
        color-scheme: dark;
        --bg: #111111;
        --panel-bg: rgba(0, 0, 0, 0.7);
        --panel-border: rgba(255, 255, 255, 0.08);
        --accent: #4cc3ff;
        --accent-soft: rgba(76, 195, 255, 0.2);
        --text: #f3f3f3;
        --muted: #999999;
        --danger: #ff5c5c;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        overflow: hidden;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;

        /* Pseudo-HDRI Hintergrund */
        background:
          radial-gradient(circle at 10% -10%, #5b6c85 0, transparent 40%),
          radial-gradient(circle at 80% 0%, #3b4a63 0, transparent 40%),
          radial-gradient(circle at 50% 120%, #05060a 0, #05060a 55%, #010103 100%);
        color: var(--text);
      }

      #app {
        position: relative;
        width: 100vw;
        height: 100vh;
      }

      #viewerContainer {
        position: absolute;
        inset: 0;
        overflow: hidden;
      }

      canvas {
        display: block;
      }

      #toolbar {
        position: absolute;
        top: 16px;
        left: 16px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding: 12px;
        background: var(--panel-bg);
        border-radius: 10px;
        border: 1px solid var(--panel-border);
        backdrop-filter: blur(12px);
        z-index: 10;
      }

      #toolbar .group {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }

      button.tool-btn {
        position: relative;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.03),
          rgba(0, 0, 0, 0.6)
        );
        color: var(--text);
        border-radius: 999px;
        padding: 6px 12px;
        font-size: 13px;
        line-height: 1.4;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.7),
          0 6px 18px rgba(0, 0, 0, 0.5);
        transition:
          background 0.15s ease,
          transform 0.08s ease,
          box-shadow 0.15s ease,
          border-color 0.15s ease,
          color 0.15s ease;
        white-space: nowrap;
      }

      button.tool-btn span.dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 0 1px rgba(76, 195, 255, 0.5),
          0 0 10px rgba(76, 195, 255, 0.9);
      }

      button.tool-btn.primary {
        background: radial-gradient(circle at 0 0, #4cc3ff, #2672ff);
        border-color: rgba(255, 255, 255, 0.4);
        color: #050505;
        box-shadow:
          0 0 0 1px rgba(0, 0, 0, 0.4),
          0 10px 25px rgba(0, 0, 0, 0.7);
      }

      button.tool-btn:hover:not(:disabled) {
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.09),
          rgba(0, 0, 0, 0.45)
        );
        transform: translateY(-1px);
        box-shadow:
          0 0 0 1px rgba(0, 0, 0, 0.7),
          0 10px 24px rgba(0, 0, 0, 0.7);
      }

      button.tool-btn.primary:hover:not(:disabled) {
        background: radial-gradient(circle at 0 0, #5fd1ff, #337dff);
      }

      button.tool-btn:active:not(:disabled) {
        transform: translateY(0);
        box-shadow:
          0 0 0 1px rgba(0, 0, 0, 0.7),
          0 4px 10px rgba(0, 0, 0, 0.6);
      }

      button.tool-btn:disabled {
        opacity: 0.45;
        cursor: default;
        box-shadow: none;
      }

      .file-slot {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: var(--muted);
      }

      .file-slot-label {
        min-width: 40px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        font-size: 11px;
      }

      .file-input-wrapper {
        position: relative;
        overflow: hidden;
        border-radius: 999px;
        border: 1px dashed rgba(255, 255, 255, 0.24);
        padding: 3px 8px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: rgba(0, 0, 0, 0.4);
        cursor: pointer;
        transition:
          border-color 0.15s ease,
          background 0.15s ease;
      }

      .file-input-wrapper:hover {
        border-color: var(--accent);
        background: rgba(0, 0, 0, 0.65);
      }

      .file-input-wrapper span {
        font-size: 11px;
        color: var(--muted);
      }

      .file-input-wrapper input[type="file"] {
        position: absolute;
        inset: 0;
        opacity: 0;
        cursor: pointer;
      }

      #infoPanel {
        position: absolute;
        left: 16px;
        bottom: 16px;
        max-width: 360px;
        padding: 10px 12px;
        background: var(--panel-bg);
        border-radius: 10px;
        border: 1px solid var(--panel-border);
        backdrop-filter: blur(12px);
        font-size: 12px;
        line-height: 1.4;
        color: var(--muted);
        z-index: 10;
      }

      #infoPanel h2 {
        margin: 0 0 4px;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: #cccccc;
      }

      #infoPanel ul {
        margin: 4px 0 0;
        padding-left: 16px;
      }

      #infoPanel li {
        margin-bottom: 2px;
      }

      #loadingOverlay {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at top, rgba(0, 0, 0, 0.85), #000);
        color: var(--text);
        font-size: 14px;
        z-index: 20;
        transition: opacity 0.25s ease;
      }

      #loadingOverlay.hidden {
        opacity: 0;
        pointer-events: none;
      }

      #loadingOverlay .box {
        padding: 16px 18px;
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.14);
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.85);
        display: flex;
        flex-direction: column;
        gap: 6px;
        min-width: 220px;
        text-align: center;
      }

      #loadingOverlay .label {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.16em;
        color: var(--muted);
      }

      #loadingOverlay .status {
        font-size: 13px;
      }

      #loadingOverlay .bar {
        margin-top: 4px;
        height: 3px;
        width: 100%;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.06);
        overflow: hidden;
        position: relative;
      }

      #loadingOverlay .bar::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          90deg,
          transparent,
          var(--accent),
          transparent
        );
        animation: loading-bar 1.4s linear infinite;
      }

      @keyframes loading-bar {
        0% {
          transform: translateX(-100%);
        }
        100% {
          transform: translateX(100%);
        }
      }

      @media (max-width: 640px) {
        #toolbar {
          top: 10px;
          left: 10px;
          right: 10px;
        }
        #infoPanel {
          left: 10px;
          right: 10px;
          bottom: 10px;
        }
      }
    </style>
  </head>

  <body>
    <div id="app">
      <div id="viewerContainer"></div>

      <!-- Toolbar -->
      <div id="toolbar">
        <div class="group">
          <button
            id="specsPreviewBtn"
            class="tool-btn primary"
            type="button"
            disabled
          >
            <span class="dot"></span>
            Specs Preview
          </button>
          <button id="exampleVideoBtn" class="tool-btn" type="button">
            Example Video
          </button>
          <button id="applyPreviewBtn" class="tool-btn" type="button">
            Apply Preview
          </button>
          <button id="sweetspotBtn" class="tool-btn" type="button">
            Sweetspot View
          </button>
        </div>

        <div class="group">
          <div class="file-slot">
            <span class="file-slot-label">Inner</span>
            <label class="file-input-wrapper">
              <span>Video wählen</span>
              <input id="innerVideoInput" type="file" accept="video/*" />
            </label>
          </div>
        </div>
        <div class="group">
          <div class="file-slot">
            <span class="file-slot-label">Outer</span>
            <label class="file-input-wrapper">
              <span>Video wählen</span>
              <input id="outerVideoInput" type="file" accept="video/*" />
            </label>
          </div>
        </div>
        <div class="group">
          <div class="file-slot">
            <span class="file-slot-label">Floor</span>
            <label class="file-input-wrapper">
              <span>Video wählen</span>
              <input id="floorVideoInput" type="file" accept="video/*" />
            </label>
          </div>
        </div>
      </div>

      <!-- Info Panel -->
      <div id="infoPanel">
        <h2>Navigation & Modi</h2>
        <ul>
          <li>Maus: Linksklick drehen, Rechtsklick schwenken, Scroll zoom.</li>
          <li>Sweetspot View setzt die anamorphe Startperspektive.</li>
          <li>Example Video nutzt Projekt‑Videos aus den Specs‑Basenames.</li>
          <li>Apply Preview: eigene Videos pro Slot hochladen.</li>
        </ul>
      </div>

      <!-- Loading Overlay -->
      <div id="loadingOverlay">
        <div class="box">
          <div class="label">STATUS</div>
          <div id="loadingStatus" class="status">Lade Model…</div>
          <div class="bar"></div>
        </div>
      </div>
    </div>

    <!-- Main Script -->
    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";
      import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

      // DOM References
      const viewerContainer = document.getElementById("viewerContainer");
      const loadingOverlay = document.getElementById("loadingOverlay");
      const loadingStatus = document.getElementById("loadingStatus");
      const specsPreviewBtn = document.getElementById("specsPreviewBtn");
      const exampleVideoBtn = document.getElementById("exampleVideoBtn");
      const applyPreviewBtn = document.getElementById("applyPreviewBtn");
      const sweetspotBtn = document.getElementById("sweetspotBtn");
      const innerVideoInput = document.getElementById("innerVideoInput");
      const outerVideoInput = document.getElementById("outerVideoInput");
      const floorVideoInput = document.getElementById("floorVideoInput");

      // Three.js Core
      const scene = new THREE.Scene();
      // Optional Fog für etwas mehr Tiefe
      scene.fog = new THREE.Fog(0x05060a, 2500, 6000);

      const renderer = new THREE.WebGLRenderer({
        antialias: true,
        powerPreference: "high-performance",
        alpha: true // Canvas transparent, Pseudo-HDRI aus CSS sichtbar
      });
      renderer.setClearColor(0x000000, 0); // keine feste Hintergrundfarbe
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      viewerContainer.appendChild(renderer.domElement);

      const camera = new THREE.PerspectiveCamera(
        45,
        window.innerWidth / window.innerHeight,
        0.1,
        10000
      );
      scene.add(camera);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;

      // Sweetspot Pose
      function goToSweetspot() {
        console.log("goToSweetspot()");
        camera.position.set(
          878.3323942469066,
          132.8253707911402,
          -897.8984202247887
        );
        controls.target.set(0, 1.2, 0);
        controls.update();
      }

      // Lights & Environment (leicht „studio“/Pseudo-HDRI abgestimmt)
      const hemiLight = new THREE.HemisphereLight(0xf0f4ff, 0x1c1f25, 0.9);
      hemiLight.position.set(0, 1, 0);
      scene.add(hemiLight);

      const dirLight = new THREE.DirectionalLight(0xffffff, 1.1);
      dirLight.position.set(300, 600, 200);
      dirLight.castShadow = true;
      dirLight.shadow.mapSize.set(2048, 2048);
      const d = 1200;
      dirLight.shadow.camera.left = -d;
      dirLight.shadow.camera.right = d;
      dirLight.shadow.camera.top = d;
      dirLight.shadow.camera.bottom = -d;
      scene.add(dirLight);

      const fillLight = new THREE.DirectionalLight(0xffffff, 0.4);
      fillLight.position.set(-600, 400, -500);
      scene.add(fillLight);

      const ambientLight = new THREE.AmbientLight(0xffffff, 0.25);
      scene.add(ambientLight);

      // Dezenter Grid + Shadow Plane, falls du Ground willst:
      const grid = new THREE.GridHelper(4000, 40, 0x555555, 0x333333);
      grid.position.y = 0;
      scene.add(grid);

      const shadowPlaneGeo = new THREE.PlaneGeometry(8000, 8000);
      const shadowMat = new THREE.ShadowMaterial({ opacity: 0.35 });
      const shadowPlane = new THREE.Mesh(shadowPlaneGeo, shadowMat);
      shadowPlane.rotation.x = -Math.PI / 2;
      shadowPlane.receiveShadow = true;
      scene.add(shadowPlane);

      // Resize Handling
      function onResize() {
        const w = window.innerWidth;
        const h = window.innerHeight;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
      }
      window.addEventListener("resize", onResize);
      onResize();

      // Loading Manager
      const loadingManager = new THREE.LoadingManager();

      loadingManager.onStart = (url, itemsLoaded, itemsTotal) => {
        console.log("Loading started", url, itemsLoaded, "/", itemsTotal);
        loadingStatus.textContent = "Lade Assets…";
        loadingOverlay.classList.remove("hidden");
      };

      loadingManager.onProgress = (url, itemsLoaded, itemsTotal) => {
        loadingStatus.textContent = `Lade ${itemsLoaded} / ${itemsTotal}…`;
      };

      loadingManager.onError = (url) => {
        console.error("Loading error:", url);
        loadingStatus.textContent = `Fehler beim Laden: ${url}`;
      };

      // Texturpfade normalisieren (alle Texturen aus /models/)
      loadingManager.setURLModifier((url) => {
        const lower = url.toLowerCase();
        if (
          lower.endsWith(".png") ||
          lower.endsWith(".jpg") ||
          lower.endsWith(".jpeg") ||
          lower.endsWith(".webp")
        ) {
          const filename = url.split("/").pop();
          const mapped = "models/" + filename;
          console.log("URLModifier", url, "→", mapped);
          return mapped;
        }
        return url;
      });

      // GLTF Loader
      const gltfLoader = new GLTFLoader(loadingManager);
      gltfLoader.setPath("models/");

      // Model & Materials
      let model = null;
      const originalMaps = new WeakMap();

      const innerMaterials = [];
      const outerMaterials = [];
      const floorMaterials = [];

      function setupModel(root) {
        console.log("setupModel(root)");
        root.traverse((child) => {
          if (!child.isMesh) return;

          child.castShadow = true;
          child.receiveShadow = true;

          const materials = Array.isArray(child.material)
            ? child.material
            : [child.material];

          for (const mat of materials) {
            if (!mat) continue;
            mat.side = THREE.DoubleSide;

            if (mat.map) {
              mat.map.colorSpace = THREE.SRGBColorSpace;
            }
            if (mat.emissiveMap) {
              mat.emissiveMap.colorSpace = THREE.SRGBColorSpace;
            }
            if (mat.specularMap) {
              mat.specularMap.colorSpace = THREE.SRGBColorSpace;
            }

            originalMaps.set(mat, mat.map || null);

            const name = (mat.name || "").toLowerCase();
            const meshName = (child.name || "").toLowerCase();

            if (
              name.includes("portal_inside_specs") ||
              meshName.includes("portal_inside_specs")
            ) {
              innerMaterials.push(mat);
            } else if (
              name.includes("portal_outside_specs") ||
              meshName.includes("portal_outside_specs")
            ) {
              outerMaterials.push(mat);
            } else if (
              name.includes("portal_floor_specs") ||
              meshName.includes("portal_floor_specs")
            ) {
              floorMaterials.push(mat);
            }
          }
        });

        console.log(
          "innerMaterials:",
          innerMaterials.length,
          "outer:",
          outerMaterials.length,
          "floor:",
          floorMaterials.length
        );

        // Bounding Box, Re‑Center & auf Boden setzen
        const box = new THREE.Box3().setFromObject(root);
        const center = new THREE.Vector3();
        box.getCenter(center);

        root.position.sub(center);
        const minY = box.min.y - center.y;
        root.position.y -= minY;

        shadowPlane.position.y = 0;

        scene.add(root);
        goToSweetspot();
      }

      // Video State
      const userVideos = {
        inner: { video: null, texture: null, url: null, isUser: true },
        outer: { video: null, texture: null, url: null, isUser: true },
        floor: { video: null, texture: null, url: null, isUser: true }
      };

      let activeVideoEntries = [];
      let isUsingVideos = false;
      let syncIntervalId = null;

      // User Upload Handling
      function handleUserVideoUpload(slot, input) {
        const file = input.files && input.files[0];
        if (!file) return;
        console.log("User upload for slot", slot, file.name);

        const current = userVideos[slot];
        if (current && current.url) {
          URL.revokeObjectURL(current.url);
        }
        if (current && current.texture) {
          current.texture.dispose();
        }

        const url = URL.createObjectURL(file);
        const video = document.createElement("video");
        video.loop = true;
        video.muted = true;
        video.playsInline = true;
        video.preload = "auto";
        video.src = url;

        video.addEventListener(
          "loadeddata",
          () => {
            console.log("User video loadeddata", slot);
            const texture = new THREE.VideoTexture(video);
            texture.colorSpace = THREE.SRGBColorSpace;
            texture.minFilter = THREE.LinearFilter;
            texture.magFilter = THREE.LinearFilter;
            texture.generateMipmaps = false;

            userVideos[slot] = { video, texture, url, isUser: true };
          },
          { once: true }
        );

        input.value = "";
      }

      innerVideoInput.addEventListener("change", () =>
        handleUserVideoUpload("inner", innerVideoInput)
      );
      outerVideoInput.addEventListener("change", () =>
        handleUserVideoUpload("outer", outerVideoInput)
      );
      floorVideoInput.addEventListener("change", () =>
        handleUserVideoUpload("floor", floorVideoInput)
      );

      // Video Sync Helpers
      function stopSyncMonitor() {
        if (syncIntervalId !== null) {
          console.log("stopSyncMonitor()");
          clearInterval(syncIntervalId);
          syncIntervalId = null;
        }
      }

      function stopAndDisposeVideos() {
        console.log("stopAndDisposeVideos()", activeVideoEntries.length);
        for (const entry of activeVideoEntries) {
          if (!entry || !entry.videoTexture) continue;
          const video = entry.video;
          try {
            video.pause();
            video.removeAttribute("src");
            video.load();
          } catch (e) {
            console.warn("Error stopping video", e);
          }
          entry.videoTexture.dispose();
        }
        activeVideoEntries = [];
        isUsingVideos = false;
      }

      function startSyncMonitor() {
        if (!activeVideoEntries.length) return;
        const videos = Array.from(
          new Set(activeVideoEntries.map((e) => e.video))
        );
        if (videos.length === 0) return;

        console.log("startSyncMonitor() videos:", videos.length);
        syncIntervalId = window.setInterval(() => {
          const ref = videos[0];
          const refTime = ref.currentTime;
          for (let i = 1; i < videos.length; i++) {
            const v = videos[i];
            if (!v || v.readyState < 2) continue;
            const delta = Math.abs(v.currentTime - refTime);
            if (delta > 0.08) {
              try {
                v.currentTime = refTime;
              } catch (e) {
                console.warn("Sync currentTime failed", e);
              }
            }
          }
        }, 250);
      }

      function waitForVideoReady(video, isUser) {
        return new Promise((resolve) => {
          if (video.readyState >= 2) {
            resolve();
            return;
          }

          const onReady = () => {
            cleanup();
            resolve();
          };

          const events = isUser
            ? ["loadeddata", "canplay"]
            : ["loadeddata", "canplaythrough"];

          events.forEach((ev) => video.addEventListener(ev, onReady));

          const timeout = window.setTimeout(() => {
            console.warn(
              "waitForVideoReady timeout",
              isUser ? "user" : "project",
              video.src
            );
            cleanup();
            resolve();
          }, isUser ? 200 : 1000);

          function cleanup() {
            events.forEach((ev) =>
              video.removeEventListener(ev, onReady)
            );
            window.clearTimeout(timeout);
          }
        });
      }

      async function activateVideoEntries(pendingEntries) {
        console.log(
          "activateVideoEntries() with",
          pendingEntries.length,
          "entries"
        );
        if (!pendingEntries.length) return;

        const uniqueVideos = [];
        const isUserFlags = [];
        const seen = new Set();

        for (const entry of pendingEntries) {
          if (!entry.video) continue;
          if (seen.has(entry.video)) continue;
          seen.add(entry.video);
          uniqueVideos.push(entry.video);
          isUserFlags.push(entry.isUser);
        }

        console.log("uniqueVideos:", uniqueVideos.length);

        await Promise.all(
          uniqueVideos.map((v, i) =>
            waitForVideoReady(v, isUserFlags[i])
          )
        );

        for (const v of uniqueVideos) {
          try {
            v.currentTime = 0;
          } catch (e) {
            console.warn("set currentTime failed", e);
          }
        }

        for (const entry of pendingEntries) {
          entry.mat.map = entry.videoTexture;
          entry.mat.needsUpdate = true;
        }

        await Promise.all(
          uniqueVideos.map((v) =>
            v.play().catch((err) => {
              console.warn("Video play() failed", v.src, err);
            })
          )
        );

        activeVideoEntries = pendingEntries;
        isUsingVideos = true;
        startSyncMonitor();
      }

      // Mode: Switch to User Videos
      async function switchToUserVideos() {
        if (!model) return;
        console.log("switchToUserVideos()");

        stopSyncMonitor();
        stopAndDisposeVideos();

        const hasAnyUserVideo =
          (userVideos.inner && userVideos.inner.video) ||
          (userVideos.outer && userVideos.outer.video) ||
          (userVideos.floor && userVideos.floor.video);

        console.log("hasAnyUserVideo:", !!hasAnyUserVideo);
        if (!hasAnyUserVideo) {
          updateButtonsForSpecsMode();
          return;
        }

        const pendingEntries = [];

        model.traverse((child) => {
          if (!child.isMesh || !child.material) return;
          const mats = Array.isArray(child.material)
            ? child.material
            : [child.material];

          for (const mat of mats) {
            const baseMap = originalMaps.get(mat);
            if (!baseMap || !baseMap.image || !baseMap.image.src) continue;

            const src = baseMap.image.src;
            const fileName = src.split("/").pop();
            if (!fileName) continue;
            const baseName = fileName
              .replace(/\.[^/.]+$/, "")
              .toLowerCase();

            if (
              userVideos.inner.video &&
              baseName === "portal_inside_specs"
            ) {
              pendingEntries.push({
                mat,
                video: userVideos.inner.video,
                videoTexture: userVideos.inner.texture,
                isUser: true
              });
            } else if (
              userVideos.outer.video &&
              baseName === "portal_outside_specs"
            ) {
              pendingEntries.push({
                mat,
                video: userVideos.outer.video,
                videoTexture: userVideos.outer.texture,
                isUser: true
              });
            } else if (
              userVideos.floor.video &&
              baseName === "portal_floor_specs"
            ) {
              pendingEntries.push({
                mat,
                video: userVideos.floor.video,
                videoTexture: userVideos.floor.texture,
                isUser: true
              });
            }
          }
        });

        console.log(
          "pendingEntries User:",
          pendingEntries.length,
          pendingEntries
        );

        if (!pendingEntries.length) {
          updateButtonsForSpecsMode();
          return;
        }

        await activateVideoEntries(pendingEntries);
        updateButtonsForUserMode();
      }

  // Mode: Switch to Project Example Videos (Hardcode-Test)
async function switchToProjectVideos() {
  if (!model) return;
  console.log("switchToProjectVideos() – HARDCODE TEST");

  stopSyncMonitor();
  stopAndDisposeVideos();

  // Nimm ein existierendes MP4 aus models/
  const videoUrl = "models/portal_inside_specs.mp4"; // ggf. Pfad/Name anpassen
  console.log("Using hardcoded videoUrl:", videoUrl);

  const video = document.createElement("video");
  video.loop = true;
  video.muted = true;
  video.playsInline = true;
  video.preload = "auto";
  video.src = videoUrl;

  const texture = new THREE.VideoTexture(video);
  texture.colorSpace = THREE.SRGBColorSpace;
  texture.minFilter = THREE.LinearFilter;
  texture.magFilter = THREE.LinearFilter;
  texture.generateMipmaps = false;

  const pendingEntries = [];
  model.traverse((child) => {
    if (!child.isMesh || !child.material) return;
    const mats = Array.isArray(child.material)
      ? child.material
      : [child.material];

    for (const mat of mats) {
      pendingEntries.push({
        mat,
        video,
        videoTexture: texture,
        isUser: false
      });
    }
  });

  console.log(
    "HARDCODE pendingEntries:",
    pendingEntries.length,
    pendingEntries
  );

  if (!pendingEntries.length) {
    console.warn("No mesh materials found for hardcode test.");
    updateButtonsForSpecsMode();
    return;
  }

  await activateVideoEntries(pendingEntries);
  updateButtonsForExampleMode();
}


      // Specs Preview: Original Textures
      function restoreOriginalTextures() {
        if (!model) return;
        console.log("restoreOriginalTextures()");

        model.traverse((child) => {
          if (!child.isMesh || !child.material) return;
          const mats = Array.isArray(child.material)
            ? child.material
            : [child.material];

          for (const mat of mats) {
            const original = originalMaps.get(mat) || null;
            mat.map = original;
            if (mat.map) mat.map.needsUpdate = true;
            mat.needsUpdate = true;
          }
        });
      }

      function switchBackToSpecs() {
        console.log("switchBackToSpecs()");
        stopSyncMonitor();
        stopAndDisposeVideos();
        restoreOriginalTextures();
        updateButtonsForSpecsMode();
      }

      // Button State Management
      function updateButtonsForSpecsMode() {
        console.log("Buttons → Specs mode");
        specsPreviewBtn.disabled = true;
        exampleVideoBtn.disabled = false;
        applyPreviewBtn.disabled = false;
      }

      function updateButtonsForExampleMode() {
        console.log("Buttons → Example mode");
        specsPreviewBtn.disabled = false;
        exampleVideoBtn.disabled = true;
        applyPreviewBtn.disabled = false;
      }

      function updateButtonsForUserMode() {
        console.log("Buttons → User mode");
        specsPreviewBtn.disabled = false;
        exampleVideoBtn.disabled = false;
        applyPreviewBtn.disabled = true;
      }

      // Button Events
      specsPreviewBtn.addEventListener("click", () => {
        console.log("Specs Preview clicked");
        switchBackToSpecs();
      });

      exampleVideoBtn.addEventListener("click", () => {
        console.log("Example Video button click");
        switchToProjectVideos();
      });

      applyPreviewBtn.addEventListener("click", () => {
        console.log("Apply Preview clicked");
        switchToUserVideos();
      });

      sweetspotBtn.addEventListener("click", () => {
        console.log("Sweetspot button click");
        goToSweetspot();
      });

      // Animation Loop
      function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
      }
      animate();

      // Load Model
      loadingStatus.textContent = "Lade Model…";
      gltfLoader.load(
        "Portal_mapped.glb",
        (gltf) => {
          console.log("GLB loaded");
          model = gltf.scene;
          setupModel(model);
          loadingOverlay.classList.add("hidden");
          // initial: Specs Preview aktiv, Buttons wie Specs Mode
          updateButtonsForSpecsMode();
        },
        undefined,
        (error) => {
          console.error("GLB load error", error);
          loadingStatus.textContent = "Fehler beim Laden des Modells.";
        }
      );
    </script>
